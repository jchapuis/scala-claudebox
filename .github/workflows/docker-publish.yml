name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        id: build
        run: |
          bash scripts/build-scala.sh scala-claudebox:ci
          echo "Built scala-claudebox:ci"

      - name: Smoke test
        run: |
          docker run --rm --entrypoint bash -u claude scala-claudebox:ci -c '
            export PATH="$HOME/.local/share/coursier/bin:$HOME/.local/bin:$PATH"
            java -version 2>&1 | head -1
            sbt --version 2>&1 | tail -1
            metals-mcp --version
            scalafmt --version
          '

      - name: Tag and push
        if: github.event_name != 'pull_request'
        run: |
          tags="${{ steps.meta.outputs.tags }}"
          for tag in $tags; do
            docker tag scala-claudebox:ci "$tag"
            docker push "$tag"
          done
